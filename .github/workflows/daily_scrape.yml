name: Daily Reels Scraper

on:
  schedule:
    - cron: "0 20 * * *"  # 8pm UTC = 8am NZT (UTC+12)
  workflow_dispatch:        # manually triggerable from the Actions tab
    inputs:
      mode:
        description: "Scrape mode"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - backfill

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "backfill" ]; then
            python scrape_reels.py --backfill
          else
            python scrape_reels.py
          fi
